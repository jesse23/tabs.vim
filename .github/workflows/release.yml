name: Publish to main

on:
  push:
    branches:
      - dev

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Publish plugin files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main

          # Remove everything on main
          git rm -rf . --quiet

          # Restore plugin files from dev
          git checkout dev -- plugin/ README.md LICENSE

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore: publish from dev @ $(git rev-parse --short dev)"
            git push origin main
          fi
